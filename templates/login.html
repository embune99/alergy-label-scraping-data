{% extends "base.html" %}

{% block title %}Login - Etos products{% endblock %}

{% block content %}
  <h1>Login</h1>
  <p>Please sign in to access the product browser.</p>

  <form method="post" style="max-width: 360px; margin-top: 1rem;">
    <div style="margin-bottom: 0.75rem;">
      <label for="username" style="display:block; font-size:0.9rem; margin-bottom:0.25rem;">Username</label>
      <input
        id="username"
        name="username"
        type="text"
        required
        value=""
        style="width:100%; padding:0.5rem 0.6rem; border-radius:0.5rem; border:1px solid #d1d5db; font-size:0.9rem;"
      />
    </div>
    <div style="margin-bottom: 0.75rem;">
      <label for="password" style="display:block; font-size:0.9rem; margin-bottom:0.25rem;">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        required
        style="width:100%; padding:0.5rem 0.6rem; border-radius:0.5rem; border:1px solid #d1d5db; font-size:0.9rem;"
      />
    </div>

    {% if error %}
      <p style="color:#b91c1c; font-size:0.9rem; margin-top:0.25rem;">{{ error }}</p>
    {% endif %}

    <button
      type="submit"
      style="margin-top:0.75rem; padding:0.5rem 1.1rem; border-radius:999px; border:none; background:#2563eb; color:white; font-size:0.9rem; cursor:pointer;"
    >
      Sign in
    </button>
  </form>
{% endblock %}
