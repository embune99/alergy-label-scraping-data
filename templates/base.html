<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}Etos products{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        background: #f5f5f7;
        color: #111827;
      }
      header {
        background: #111827;
        color: #f9fafb;
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header a {
        color: inherit;
        text-decoration: none;
      }
      header nav a {
        margin-left: 1.5rem;
        font-size: 0.9rem;
        opacity: 0.85;
      }
      header nav a:hover {
        opacity: 1;
      }
      main {
        max-width: 1100px;
        margin: 1.5rem auto 3rem;
        padding: 0 1rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 0.75rem; /* 12px */
      }
      .card {
        background: #ffffff;
        border-radius: 0.75rem;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
        padding: 1rem;
        border: 1px solid rgba(15, 23, 42, 0.04);
        display: flex;
        flex-direction: column;
        height: 100%;
        transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
      }
      .card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
        border-color: rgba(37, 99, 235, 0.2);
      }
      .card h2, .card h3 {
        margin: 0 0 0.5rem;
        font-size: 1rem;
      }
      .card p {
        margin: 0.15rem 0;
        font-size: 0.9rem;
        color: #4b5563;
      }
      .card a {
        margin-top: auto;
        align-self: flex-start;
        text-decoration: none;
        font-size: 0.9rem;
        color: #2563eb;
      }
      .badge {
        display: inline-block;
        padding: 0.1rem 0.5rem;
        border-radius: 999px;
        background: #e5e7eb;
        font-size: 0.75rem;
        color: #374151;
      }
      .breadcrumbs {
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
      .breadcrumbs a {
        color: #2563eb;
        text-decoration: none;
      }
      img.product-thumb {
        width: 100%;
        max-height: 180px;
        object-fit: contain;
        margin-bottom: 0.5rem;
      }
      pre {
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        background: #020617;
        color: #e5e7eb;
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        font-size: 0.85rem;
        overflow-x: auto;
      }
      footer {
        border-top: 1px solid #e5e7eb;
        padding: 1.25rem 1rem;
        font-size: 0.8rem;
        color: #6b7280;
        max-width: 1100px;
        margin: 0 auto 1.5rem;
      }
      footer a {
        color: #2563eb;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="{{ url_for('index') }}"><strong>Etos Products Browser</strong></a>
      <nav>
        <a href="{{ url_for('index') }}">All categories</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <footer>
      Local viewer for Etos crawled products. Data is loaded directly from JSON files on disk.
    </footer>
  </body>
  </html>
